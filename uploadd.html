<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>फोटो अपलोड करें - जीआईसी रगड़गांव</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .upload-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .file-input {
            margin-bottom: 20px;
            display: block;
            width: 100%;
        }
        .btn-submit {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .btn-submit:hover {
            background-color: #27ae60;
        }
        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>अपनी फोटो अपलोड करें</h2>
        
        <!-- फोटो अपलोड करने का फॉर्म -->
        <form action="#" method="POST" enctype="multipart/form-data">
            <input type="file" accept="image/*" class="file-input" required>
            <button type="submit" class="btn-submit">अपलोड करें</button>
        </form>

        <a href="index.html" class="back-link">← मुख्य पेज पर वापस जाएँ</a>
    </div>

</body>
</html>
